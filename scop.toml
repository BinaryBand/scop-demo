#:schema scop/models/schemas/scop.manifest.schema.json

[app]
name = "scop"
version = "0.1.0"
description = "File and directory snapshotter"
scop_version = "0.1.2-draft"

[[app.global_param]]
name = "--quiet"
kind = "flag"
type = "boolean"
short = "-q"

[[app.global_param]]
name = "--verbose"
kind = "flag"
type = "boolean"
short = "-v"

[[room]]
id = ""
title = "scop"
subtitle = "Structured CLI Output Protocol"

[[room.command]]
name = "Snapshot"
exec = "snapshot"
description = "Manage snapshots"
kind = "group"
navigates = "snapshot"

[[room]]
id = "snapshot"
title = "Snapshots"
subtitle = "Manage and compare snapshots"

[[room.stat]]
id = "last_snap"
label = "Last snapshot"
type = "datetime"

[[room.stat]]
id = "tracked"
label = "Tracked files"
type = "number"

[[room.stat]]
id = "changed"
label = "Changed since last snap"
type = "number"

[room.list]
schema = ["name", "files", "size", "date"]

[[room.command]]
name = "Create"
exec = "snapshot create"
description = "Take a new snapshot"
kind = "action"

[[room.command.param]]
name = "path"
kind = "positional"
type = "string"
metavar = "PATH"

[[room.command.param]]
name = "--dry-run"
kind = "flag"
type = "boolean"
short = "-n"

[[room.command.param]]
name = "--force"
kind = "flag"
type = "boolean"
short = "-f"

[[room.command.param]]
name = "--output"
kind = "flag"
type = "string"
short = "-o"
metavar = "FILE"

[[room.command.param]]
name = "--recursive"
kind = "flag"
type = "boolean"
short = "-r"

[[room.command]]
name = "Restore"
exec = "snapshot restore"
description = "Restore a snapshot to a directory"
kind = "action"

[[room.command.param]]
name = "name"
kind = "positional"
type = "string"
metavar = "SNAPSHOT_ID"

[[room.command.param]]
name = "dest"
kind = "positional"
type = "string"
metavar = "OUTPUT_DIR"

[[room.command]]
name = "Diff"
exec = "snapshot diff"
description = "Compare two snapshots"
kind = "action"
navigates = "snapshot/diff"

[[room.command.param]]
name = "--from"
kind = "flag"
type = "string"
metavar = "SNAPSHOT_ID"
required = true

[[room.command.param]]
name = "--to"
kind = "flag"
type = "string"
metavar = "SNAPSHOT_ID"
required = true

[[room.command.param]]
name = "--output"
kind = "flag"
type = "string"
short = "-o"
metavar = "FILE"

[[room]]
id = "snapshot/diff"
title = "Diff"
subtitle = "Compare snapshots"

[[room.command]]
name = "Diff"
exec = "snapshot diff"
description = "Compare two snapshots"
kind = "action"

[[room.command.param]]
name = "--from"
kind = "flag"
type = "string"
metavar = "SNAPSHOT_ID"
required = true

[[room.command.param]]
name = "--to"
kind = "flag"
type = "string"
metavar = "SNAPSHOT_ID"
required = true

[[room.command.param]]
name = "--output"
kind = "flag"
type = "string"
short = "-o"
metavar = "FILE"
