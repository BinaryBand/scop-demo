---
# dispatches edge — CLI boundary
id: no-argparse-outside-cli
language: python
severity: error
message: argparse may only be imported in cli.py (ARCHITECTURE.md convention 8)
rule:
  pattern: import argparse
files:
  - "scop/adapters/**/*.py"
  - "scop/app/**/*.py"
  - "scop/models/**/*.py"
  - "scop/ports/**/*.py"
  - "scop/services/**/*.py"
  - "scop/utils/**/*.py"
---
# dispatches edge — CLI boundary
id: no-sys-exit-outside-cli
language: python
severity: error
message: sys.exit() may only be called in cli.py (ARCHITECTURE.md convention 8)
rule:
  pattern: sys.exit($$$ARGS)
files:
  - "scop/adapters/**/*.py"
  - "scop/app/**/*.py"
  - "scop/models/**/*.py"
  - "scop/ports/**/*.py"
  - "scop/services/**/*.py"
  - "scop/utils/**/*.py"
---
# implements edge — adapter must declare its port (positive)
id: adapter-must-declare-port
language: python
severity: error
message: >
  Adapter subclass '$NAME' must declare `port: ClassVar[type[Port]]`
  (ARCHITECTURE.md convention 4 — port↔adapter parity)
rule:
  all:
    - pattern: |
        class $NAME(Adapter):
            $$$BODY
    - not:
        regex: "port: ClassVar"
files:
  - "scop/adapters/**/*.py"
---
# implements edge — adapters must not call other adapters (negative)
id: no-adapter-cross-import
language: python
severity: error
message: >
  Adapters must not import other adapter modules — each adapter implements
  its port in isolation (implements edge contract)
rule:
  any:
    - pattern: "from scop.adapters.$MOD import $$$"
    - pattern: "import scop.adapters.$MOD"
files:
  - "scop/adapters/**/*.py"
