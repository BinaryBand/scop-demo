id: utils-allowlist
language: python
severity: error
message: >
  '$MOD' is not in the utils/ subdirectory allowlist — permitted: fs, proc, net, fmt, text, env, time, hash, crypto, archive, concurrent, collect (Rule 10)
rule:
  all:
    - any:
        - pattern: "from scop.utils.$MOD import $$$"
        - pattern: "import scop.utils.$MOD"
    - not:
        regex: "scop\\.utils\\.(fs|proc|net|fmt|text|env|time|hash|crypto|archive|concurrent|collect)\\b"
