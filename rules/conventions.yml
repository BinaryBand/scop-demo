---
# Rule 8: argparse and sys.exit only in cli.py
id: no-argparse-outside-cli
language: python
severity: error
message: argparse may only be imported in cli.py (ARCHITECTURE.md convention 8)
rule:
  pattern: import argparse
files:
  - "scop/adapters/**/*.py"
  - "scop/app/**/*.py"
  - "scop/models/**/*.py"
  - "scop/ports/**/*.py"
  - "scop/services/**/*.py"
  - "scop/utils/**/*.py"
---
# Rule 8: argparse and sys.exit only in cli.py
id: no-sys-exit-outside-cli
language: python
severity: error
message: sys.exit() may only be called in cli.py (ARCHITECTURE.md convention 8)
rule:
  pattern: sys.exit($$$ARGS)
files:
  - "scop/adapters/**/*.py"
  - "scop/app/**/*.py"
  - "scop/models/**/*.py"
  - "scop/ports/**/*.py"
  - "scop/services/**/*.py"
  - "scop/utils/**/*.py"
---
# Rule 9: MSGID from fixed table only
# Covers both construction sites (SyslogMessage kwarg) and comparison sites
# (equality against a `msgid` variable or attribute). The `msgid` name is the
# structural anchor — no MSGID vocabulary list needed.
id: msgid-must-use-enum
language: python
severity: error
message: >
  Use MSGID.<value> from the enum — raw strings bypass the fixed-table contract (Rule 9)
rule:
  any:
    - pattern: "SyslogMessage($$$, msgid=$RAW, $$$)"
    - pattern: "msgid == $RAW"
    - pattern: "$OBJ.msgid == $RAW"
    - pattern: "$RAW == msgid"
    - pattern: "$RAW == $OBJ.msgid"
constraints:
  RAW:
    kind: string
---
# Rule 10: utils/ subdirectory allowlist
id: utils-allowlist
language: python
severity: error
message: >
  '$MOD' is not in the utils/ subdirectory allowlist — permitted: fs, proc, net, fmt, text, env, time, hash, crypto, archive, concurrent, collect (Rule 10)
rule:
  all:
    - any:
        - pattern: "from scop.utils.$MOD import $$$" # utils/fs.py
        - pattern: "from scop.utils.$MOD.$_ import $$$" # utils/fs/__init__.py or utils/fs/reader.py
        - pattern: "import scop.utils.$MOD"
        - pattern: "import scop.utils.$MOD.$_"
    - not:
        regex: "scop\\.utils\\.(fs|proc|net|fmt|text|env|time|hash|crypto|archive|concurrent|collect)\\b"
