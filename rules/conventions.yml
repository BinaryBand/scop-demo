# Rule 1:  ast-grep (side-effect stdlib imports and direct open() in core layers)
# Rule 2:  import-linter (.importlinter)
# Rule 3:  one-class-per-role-file
# Rule 4:  adapter-must-declare-port
# Rule 5:  adapter/service/port/app-class-convention, port-must-extend-port
# Rule 6:  models-must-be-value-type; ruff ANN, B024; ty
# Rule 7:  cli-only-import-appdispatcher
# Rule 8:  no-argparse-outside-cli, no-sys-exit-outside-cli
# Rule 9:  msgid-must-use-enum
# Rule 10: utils-allowlist
# Rule 11: pytest tests.architecture.test_rule_11_depth_imports
# Rule 12: ruff TID banned-api, FA102
---
# Rule 1: core layers may not import side-effectful stdlib modules directly.
id: no-side-effect-stdlib-imports-in-core
language: python
severity: error
message: >
  Rule 1: app/services/ports/models must stay side-effect-free. Import this stdlib module via scop.utils in adapters instead.
rule:
  any:
    - pattern: "import $MOD"
    - pattern: "from $MOD import $$$"
constraints:
  MOD:
    regex: "^(?:asyncio|concurrent|glob|gzip|bz2|lzma|http|urllib|ftplib|imaplib|smtplib|telnetlib|importlib|runpy|os|pathlib|queue|shutil|socket|ssl|stat|subprocess|tarfile|tempfile|threading|zipfile|io|mmap|multiprocessing)(?:\\..*)?$"
files:
  - "scop/app/**/*.py"
  - "scop/services/**/*.py"
  - "scop/ports/**/*.py"
  - "scop/models/**/*.py"

---
# Rule 1: core layers may not perform direct file I/O.
id: no-direct-open-in-core
language: python
severity: error
message: >
  Rule 1: app/services/ports/models must not perform direct file I/O; route file access through ports/adapters/utils.
rule:
  any:
    - pattern: "open($$$)"
    - pattern: "io.open($$$)"
    - pattern: "os.open($$$)"
    - pattern: "$PATH.open($$$)"
    - pattern: "$PATH.read_text($$$)"
    - pattern: "$PATH.read_bytes($$$)"
    - pattern: "$PATH.write_text($$$)"
    - pattern: "$PATH.write_bytes($$$)"
    - pattern: "$PATH.touch($$$)"
    - pattern: "$PATH.unlink($$$)"
    - pattern: "$PATH.mkdir($$$)"
    - pattern: "$PATH.rmdir($$$)"
    - pattern: "$PATH.rename($$$)"
    - pattern: "$PATH.replace($$$)"
    - pattern: "$PATH.symlink_to($$$)"
    - pattern: "$PATH.hardlink_to($$$)"
files:
  - "scop/app/**/*.py"
  - "scop/services/**/*.py"
  - "scop/ports/**/*.py"
  - "scop/models/**/*.py"

---
# Rule 1: core layers may not dynamically import side-effectful modules.
id: no-dynamic-import-in-core
language: python
severity: error
message: >
  Rule 1: app/services/ports/models must not use dynamic imports; import through
  stable layer boundaries (ports/adapters/utils).
rule:
  any:
    - pattern: "__import__($$$)"
    - pattern: "import_module($$$)"
    - pattern: "importlib.import_module($$$)"
files:
  - "scop/app/**/*.py"
  - "scop/services/**/*.py"
  - "scop/ports/**/*.py"
  - "scop/models/**/*.py"
---
# Rule 1: asyncio may only appear in cli.py and adapters/runtime_adapter.py.
id: no-asyncio-outside-runtime-adapter
language: python
severity: error
message: >
  Rule 1: asyncio is confined to cli.py and adapters/runtime_adapter.py — the event loop and task scheduling are owned at the entry point and the runtime adapter respectively.
rule:
  any:
    - pattern: "import asyncio"
    - pattern: "from asyncio import $$$"
files:
  - "scop/adapters/**/*.py"
ignores:
  - "scop/adapters/runtime_adapter.py"
---
# Rule 3: One class per role file
id: one-class-per-role-file
language: python
severity: error
message: >
  Role files must define exactly one class; '$NAME' is a second class definition
rule:
  all:
    - pattern: |
        class $NAME($$$):
          $$$
    - follows:
        pattern: |
          class $OTHER($$$):
            $$$
files:
  - "scop/adapters/**/*_adapter.py"
  - "scop/services/**/*_service.py"
  - "scop/ports/**/*_port.py"
  - "scop/app/**/*_app.py"
---
# Rule 4: Port↔adapter parity
id: adapter-must-declare-port
language: python
severity: error
message: >
  Adapter subclass '$NAME' must declare `port: ClassVar[type[Port]]`
  (ARCHITECTURE.md convention 4 — port↔adapter parity)
rule:
  all:
    - pattern: |
        class $NAME(Adapter):
            $$$BODY
    - not:
        pattern: |
          class $NAME(Adapter):
            port: ClassVar
files:
  - "scop/adapters/**/*.py"
---
# Rule 5: Marker base per layer — adapter
id: adapter-class-convention
language: python
severity: error
message: >
  '$NAME' in an adapter file must have the 'Adapter' suffix and extend Adapter
rule:
  all:
    - pattern: "class $NAME($$$): $$$"
    - any:
        - not:
            regex: "class [A-Z]\\w*Adapter[^a-zA-Z_]"
        - not:
            any:
              - pattern: |
                  class $NAME(Adapter):
                    $$$
              - pattern: |
                  class $NAME(Adapter, $$$):
                    $$$
files:
  - "scop/adapters/**/*_adapter.py"
---
# Rule 5: Marker base per layer — service
id: service-class-convention
language: python
severity: error
message: >
  '$NAME' in a service file must have the 'Service' suffix and extend Service
rule:
  all:
    - pattern: "class $NAME($$$): $$$"
    - any:
        - not:
            regex: "class [A-Z]\\w*Service[^a-zA-Z_]"
        - not:
            any:
              - pattern: |
                  class $NAME(Service):
                    $$$
              - pattern: |
                  class $NAME(Service, $$$):
                    $$$
files:
  - "scop/services/**/*_service.py"
---
# Rule 5: Marker base per layer — port
id: port-class-convention
language: python
severity: error
message: >
  '$NAME' in a port file must have the 'Port' suffix and extend Port
rule:
  all:
    - pattern: "class $NAME($$$): $$$"
    - any:
        - not:
            regex: "class [A-Z]\\w*Port[^a-zA-Z_]"
        - not:
            any:
              - pattern: |
                  class $NAME(Port):
                    $$$
              - pattern: |
                  class $NAME(Port, $$$):
                    $$$
files:
  - "scop/ports/**/*_port.py"
---
# Rule 5: Marker base per layer — app
id: app-class-convention
language: python
severity: error
message: >
  '$NAME' in an app file must have the 'App' suffix and extend BaseApp
rule:
  all:
    - pattern: "class $NAME($$$): $$$"
    - any:
        - not:
            regex: "class [A-Z]\\w*App[^a-zA-Z_]"
        - not:
            any:
              - pattern: |
                  class $NAME(BaseApp):
                    $$$
              - pattern: |
                  class $NAME(BaseApp, $$$):
                    $$$
files:
  - "scop/app/**/*_app.py"
---
# Rule 5 (extension): Every class in ports/ must extend Port.
id: port-must-extend-port
language: python
severity: error
message: >
  '$NAME' in ports/ must extend Port (Rule 5). If this file is not yet named
  *_port.py, also rename it and the class to satisfy Rule 3.
rule:
  all:
    - pattern: "class $NAME($$$): $$$"
    - not:
        any:
          - pattern: "class $NAME(Port): $$$"
          - pattern: "class $NAME(Port, $$$): $$$"
          - pattern: "class $NAME($$$, Port): $$$"
files:
  - "scop/ports/**/*.py"
---
# Rule 6: Every class in models/ must be @dataclass(frozen=True) or an Enum subclass.
id: models-must-be-value-type
language: python
severity: error
message: >
  '$NAME' in models/ must be @dataclass(frozen=True) or an Enum subclass (Rule 6).
rule:
  all:
    - pattern: "class $NAME($$$): $$$"
    - not:
        any:
          - inside:
              pattern: |
                @dataclass(frozen=True)
                class $C($$$):
                  $$$
          - pattern: "class $NAME(Enum): $$$"
          - pattern: "class $NAME(Enum, $$$): $$$"
          - pattern: "class $NAME($$$, Enum): $$$"
          - pattern: "class $NAME(StrEnum): $$$"
          - pattern: "class $NAME(StrEnum, $$$): $$$"
          - pattern: "class $NAME($$$, StrEnum): $$$"
          - pattern: "class $NAME(IntEnum): $$$"
          - pattern: "class $NAME(Flag): $$$"
          - pattern: "class $NAME(BaseModel): $$$"
          - pattern: "class $NAME(BaseModel, $$$): $$$"
          - pattern: "class $NAME($$$, BaseModel): $$$"
files:
  - "scop/models/**/*.py"
---
# Rule 7: cli.py may only import AppDispatcher
id: cli-only-import-appdispatcher
language: python
severity: error
message: >
  cli.py may only import AppDispatcher from scop.app.dispatcher (Rule 7)
rule:
  all:
    - any:
        - pattern: "from scop.app.$MOD import $$$"
        - pattern: "import scop.app.$MOD"
        - pattern: "from scop.models.$MOD import $$$"
        - pattern: "import scop.models.$MOD"
    - not:
        pattern: "from scop.app.dispatcher import AppDispatcher"
files:
  - "scop/cli.py"
---
# Rule 8: argparse and sys.exit only in cli.py
id: no-argparse-outside-cli
language: python
severity: error
message: argparse may only be imported in cli.py (ARCHITECTURE.md convention 8)
rule:
  any:
    - pattern: import argparse
    - pattern: "from argparse import $$$"
files:
  - "scop/adapters/**/*.py"
  - "scop/app/**/*.py"
  - "scop/models/**/*.py"
  - "scop/ports/**/*.py"
  - "scop/services/**/*.py"
  - "scop/utils/**/*.py"
---
# Rule 8: argparse and sys.exit only in cli.py
id: no-sys-exit-outside-cli
language: python
severity: error
message: sys.exit() may only be called in cli.py (ARCHITECTURE.md convention 8)
rule:
  pattern: sys.exit($$$ARGS)
files:
  - "scop/adapters/**/*.py"
  - "scop/app/**/*.py"
  - "scop/models/**/*.py"
  - "scop/ports/**/*.py"
  - "scop/services/**/*.py"
  - "scop/utils/**/*.py"
---
# Rule 9: MSGID from fixed table only
id: msgid-must-use-enum
language: python
severity: error
message: >
  Use MSGID.<value> from the enum — raw strings bypass the fixed-table contract (Rule 9)
rule:
  any:
    - pattern: "SyslogMessage($$$, msgid=$RAW, $$$)"
    - pattern: "msgid == $RAW"
    - pattern: "$OBJ.msgid == $RAW"
    - pattern: "$RAW == msgid"
    - pattern: "$RAW == $OBJ.msgid"
constraints:
  RAW:
    kind: string
ignores:
  - "scop/clig.py"
  - "scop/cli.py"
  - "scop/gui.py"
---
# Rule 10: utils/ subdirectory allowlist
id: utils-allowlist
language: python
severity: error
message: >
  '$MOD' is not in the utils/ subdirectory allowlist — permitted: fs, proc, net, fmt, text, code, env, time, hash, crypto, archive, concurrent, collect (Rule 10)
rule:
  all:
    - any:
        - pattern: "from scop.utils.$MOD import $$$" # utils/fs.py
        - pattern: "from scop.utils.$MOD.$_ import $$$" # utils/fs/__init__.py or utils/fs/reader.py
        - pattern: "import scop.utils.$MOD"
        - pattern: "import scop.utils.$MOD.$_"
    - not:
        regex: "scop\\.utils\\.(fs|proc|net|fmt|text|code|env|time|hash|crypto|archive|concurrent|collect)\\b"
