id: app-class-convention
language: python
severity: error
message: >
  '$NAME' in an app file must have the 'App' suffix and extend BaseApp
rule:
  all:
    - pattern: "class $NAME($$$): $$$"
    - any:
        - not:
            regex: "class [A-Z]\\w*App[^a-zA-Z_]"
        - not:
            any:
              - pattern: |
                  class $NAME(BaseApp):
                    $$$
              - pattern: |
                  class $NAME(BaseApp, $$$):
                    $$$
files:
  - "scop/app/**/*_app.py"
