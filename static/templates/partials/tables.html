{# Tables partial: expects `tables` list in context #}
{% for t in tables %}
  <table class="mdc-data-table" cellpadding="4">
    <thead>
      <tr>
        {% for c in t.schema %}<th>{{ c }}</th>{% endfor %}
      </tr>
    </thead>
    <tbody>
    {% for row in t.rows %}
      <tr>
        {% for c in t.schema %}
          <td>{{ row.get(c, '') }}</td>
        {% endfor %}
      </tr>
    {% endfor %}
    </tbody>
  </table>
{% endfor %}
